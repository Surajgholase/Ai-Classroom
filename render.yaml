services:
  - type: web
    name: ai-classroom-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn classroom_backend.wsgi:application --workers 1 --threads 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
    rootDir: backend
